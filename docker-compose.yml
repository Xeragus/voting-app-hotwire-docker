services:
  db:
    image: postgres:15-alpine
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      # This creates the database user and password inside the PostgreSQL container
      POSTGRES_USER: voting_b2b_admin
      POSTGRES_PASSWORD: b2b123123
      POSTGRES_DB: voting_b2b_development
    ports:
      # Optional: To connect to the DB from your host machine with a GUI client
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -c "rm -f tmp/pids/server.pid && bin/rails server -b 0.0.0.0"
    volumes:
      - .:/rails
      - bundle_data:/usr/local/bundle
      - bootsnap_cache:/rails/tmp/cache
    ports:
      - "3000:3000"
    environment:
      # These variables tell your Rails app how to connect to the database
      DATABASE_HOST: db               # <--- IMPORTANT: Use the service name, not 'localhost'
      DATABASE_USER: voting_b2b_admin
      DATABASE_PASSWORD: b2b123123
      DATABASE_DB: voting_b2b_development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY} # Reads from the .env file
    depends_on:
      - db

# Define named volumes to persist data
volumes:
  db_data:
  bundle_data:
  bootsnap_cache: